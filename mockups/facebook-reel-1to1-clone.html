<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WEAREBRAND Reel — 1:1 Visual Clone</title>
  <meta name="description" content="A 1:1 visual recreation of the website shown in the Facebook Reel, using frame-matched section artwork and scroll-driven transitions." />
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;min-height:100%;background:#060607;color:white;font-family:Inter,Arial,sans-serif;overflow-x:hidden;scrollbar-width:none}html::-webkit-scrollbar,body::-webkit-scrollbar{display:none}body{overscroll-behavior:none}.stage{height:500vh;position:relative;background:#050506}.pin{position:sticky;top:0;height:100vh;overflow:hidden;display:grid;place-items:center;background:#050506}.reel{position:relative;width:100vw;height:100vh;overflow:hidden}.track{position:absolute;inset:0;display:flex;width:500vw;height:100%;transform:translate3d(calc(var(--p,0) * -400vw),0,0);transition:transform .08s linear}.panel{position:relative;flex:0 0 100vw;height:100vh;display:grid;place-items:center;background:#060607;overflow:hidden}.screen{position:relative;width:min(100vw,calc(100vh * 1.806));aspect-ratio:990/548;max-height:100vh;background:#111;box-shadow:0 0 0 1px rgba(255,255,255,.08),0 40px 120px rgba(0,0,0,.58);overflow:hidden}.screen img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}.screen::after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(90deg,rgba(0,0,0,.20),transparent 10%,transparent 90%,rgba(0,0,0,.18)),linear-gradient(180deg,rgba(255,255,255,.04),transparent 35%,rgba(0,0,0,.08));mix-blend-mode:soft-light}.hud{position:fixed;z-index:10;left:18px;right:18px;bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:20px;pointer-events:none;color:rgba(255,255,255,.65);font-size:11px;letter-spacing:.12em;text-transform:uppercase}.dots{display:flex;gap:8px}.dot{width:7px;height:7px;border-radius:99px;background:rgba(255,255,255,.28);transition:.25s}.dot.active{width:31px;background:white}.label{padding:8px 11px;border:1px solid rgba(255,255,255,.16);border-radius:999px;background:rgba(0,0,0,.25);backdrop-filter:blur(12px)}.intro{position:fixed;z-index:11;top:18px;left:50%;transform:translateX(-50%);font-size:12px;color:rgba(255,255,255,.56);letter-spacing:.02em;padding:8px 12px;border-radius:999px;background:rgba(0,0,0,.34);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(16px);transition:opacity .3s}.intro.hide{opacity:0}.fallback{display:none}@media (max-aspect-ratio:990/548){.screen{width:100vw;height:auto}}@media (min-aspect-ratio:990/548){.screen{height:100vh;width:auto}}@media (max-width:700px){.screen{width:100vw;height:auto}.pin{background:#050506}.hud{font-size:9px;bottom:11px}.intro{font-size:10px;white-space:nowrap}}@media (prefers-reduced-motion:reduce){.track{transition:none}}
  </style>
</head>
<body>
  <main class="stage" id="stage" aria-label="1:1 clone of the website shown in the Facebook Reel">
    <div class="pin">
      <div class="reel">
        <div class="track" id="track">
          <section class="panel" aria-label="need amazing content"><div class="screen"><img src="assets/reel-clone/hero.jpg" alt="need amazing content — pink smoke and white car" /></div></section>
          <section class="panel" aria-label="exceptional by design"><div class="screen"><img src="assets/reel-clone/planet.jpg" alt="exceptional by design — dark planet desert scene" /></div></section>
          <section class="panel" aria-label="powerful experiences for unique brands"><div class="screen"><img src="assets/reel-clone/astronaut1.jpg" alt="powerful experiences for unique brands — astronaut and pink clouds" /></div></section>
          <section class="panel" aria-label="powerful experiences UFO detail"><div class="screen"><img src="assets/reel-clone/astronaut2.jpg" alt="astronaut section with UFOs and birds" /></div></section>
          <section class="panel" aria-label="make your brand memorable"><div class="screen"><img src="assets/reel-clone/ufo.jpg" alt="make your brand memorable — UFOs and small figure" /></div></section>
        </div>
      </div>
    </div>
  </main>
  <script>
    const stage=document.getElementById('stage'),track=document.getElementById('track');
    function update(){const max=stage.offsetHeight-innerHeight;const p=Math.min(1,Math.max(0,-stage.getBoundingClientRect().top/max));track.style.setProperty('--p',p.toFixed(5));}
    addEventListener('scroll',update,{passive:true});addEventListener('resize',update);update();
  </script>
</body>
</html>
